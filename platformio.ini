; ==============================================================================
; CR_EthernetSwitch_rev1 — Cornell Racing STM32H753VIT6 + KSZ9477 switch board
;
; One project, three build environments:
;   [env:firmware]           src/main.cpp (starter / your real code)
;   [env:example_udpecho]    examples/KSZ9477_UdpEcho/
;   [env:example_ledtest]    examples/KSZ9477_LedPolarityTest/
;
; Flash any of them:
;   pio run -e firmware -t upload
;   pio run -e example_udpecho -t upload
; ==============================================================================

[platformio]
boards_dir = board

[env]
platform = ststm32
framework = arduino
board = cr_eth_switch

; --- Custom variant (ldscript at D2 SRAM 0x30040000 + SPI1 MOSI on PD7) ------
board_build.variants_dir = board/variants
board_build.ldscript = board/variants/H753VIT6_Custom/ldscript.ld

; --- Upload: DFU (ST bootloader: enter DFU via BOOT0 high on reset) ----------
upload_protocol = dfu

; --- Serial monitor over the CDC USB port ------------------------------------
monitor_speed = 115200

; --- Build flags -------------------------------------------------------------
; USB: CDC "generic 'Serial' supersede U(S)ART" + generic U(S)ART Serial enabled.
; Mirrors boards.local.txt:
;   USB=CDCgen  -> -DUSBCON -DUSBD_USE_CDC -DUSBD_VID=0x0483 -DUSBD_PID=0x5740
;   xserial=generic -> (no define; default)
; ETH: enable HAL ETH + register-callback API (library targets core 2.12+).
build_flags =
  -DUSBCON
  -DUSBD_USE_CDC
  -DUSBD_VID=0x0483
  -DUSBD_PID=0x5740
  -DUSB_MANUFACTURER="\"Cornell Racing\""
  -DUSB_PRODUCT="\"CR Ethernet Switch\""
  -DHAL_PCD_MODULE_ENABLED
  -DHAL_ETH_MODULE_ENABLED
  -DUSE_HAL_ETH_REGISTER_CALLBACKS=1

; --- Library resolution ------------------------------------------------------
; STM32_CornellRacing_Ethernet lives in lib/ (auto-detected).
; STM32duino LwIP comes from the PIO registry via the lib's `depends=`.
lib_deps =
  stm32duino/STM32duino LwIP

lib_ldf_mode = deep+

; --- Pin the STM32 Arduino core to a version that has the H7 HAL ETH fixes --
; Library README notes "HAL ETH callback-API fixes for STM32H7 (core 2.12+)".
; Unpin if you want whatever the current ststm32 platform ships.
; platform_packages =
;   framework-arduinoststm32 @ ~4.20900.0

[env:firmware]
; default build target — src/main.cpp

[env:example_udpecho]
build_src_filter = -<*> +<../examples/KSZ9477_UdpEcho/>

[env:example_ledtest]
build_src_filter = -<*> +<../examples/KSZ9477_LedPolarityTest/>
