; CR_EthernetSwitch_rev1 — Cornell Racing STM32H753VIT6 + KSZ9477 switch board
;
;   pio run -e firmware         -t upload    (default; src/main.cpp)
;   pio run -e example_udpecho  -t upload
;   pio run -e example_ledtest  -t upload

[platformio]
boards_dir = board
default_envs = firmware

[env]
platform = ststm32
framework = arduino
board = cr_eth_switch

board_build.variants_dir = board/variants
board_build.ldscript = board/variants/H753VIT6_Custom/ldscript.ld

upload_protocol = dfu
extra_scripts = post:extra/pio_dfu_patch.py

monitor_speed = 115200

; USB CDC Serial (supersedes U(S)ART) + HAL ETH register-callback API.
build_flags =
  -DUSBCON
  -DUSBD_USE_CDC
  -DUSBD_VID=0x0483
  -DUSBD_PID=0x5740
  -DUSB_MANUFACTURER="\"Cornell Racing\""
  -DUSB_PRODUCT="\"CR Ethernet Switch\""
  -DHAL_PCD_MODULE_ENABLED
  -DUSE_HAL_ETH_REGISTER_CALLBACKS=1

lib_deps =
  stm32duino/STM32duino LwIP

lib_ldf_mode = deep+

[env:firmware]

[env:example_udpecho]
build_src_filter = -<*> +<../examples/KSZ9477_UdpEcho/>

[env:example_ledtest]
build_src_filter = -<*> +<../examples/KSZ9477_LedPolarityTest/>
