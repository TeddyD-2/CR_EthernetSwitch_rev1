name=STM32 CornellRacing Ethernet
version=1.5.1-h7
author=Cornell Racing (fork of STM32duino STM32Ethernet)
maintainer=Cornell Racing
sentence=Ethernet + KSZ9477 switch driver bundle for the Cornell Racing STM32H753VIT6 board.
paragraph=Two APIs in one library. (1) KSZ9477.h — a simple Arduino class for configuring the Microchip KSZ9477 managed switch over SPI: chip ID check, hardware reset, port-6 RMII bring-up, per-port enable/disable, link status, interrupts, and raw register access. Pin map is fully runtime-configurable via setPins(). (2) STM32Ethernet.h — a fork of STM32duino STM32Ethernet with HAL ETH callback-API fixes for STM32H7 (core 2.12+) and MAC-to-MAC support. Including KSZ9477.h transitively pulls in the TCP/IP stack so only one include is needed. Depends on LwIP.
category=Communication
url=https://github.com/stm32duino/STM32Ethernet
architectures=stm32
depends=STM32duino LwIP
